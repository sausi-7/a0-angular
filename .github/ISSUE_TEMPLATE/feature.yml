name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user pain, not the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Sketch of the API / UX you have in mind. It's fine to leave this rough.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: roadmap
    attributes:
      label: Roadmap alignment
      options:
        - label: I've checked ROADMAP.md and this isn't already planned for an earlier phase
